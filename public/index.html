<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lofi Content Plan Manager - Crunsh</title>
    
    <!-- Google Fonts - Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- Tailwind CSS + DaisyUI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet" type="text/css" />
    
    <style>
      .brand-font {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 700;
      }
      
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }

      .crunsh-bg-light {
        background: #ff9f2a;
      }
      
      .crunsh-bg {
        background: #FF5C2A;
      }
    </style>
  </head>
  <body class="crunsh-bg-light min-h-screen p-5">
    <div class="max-w-4xl mx-auto">
      <!-- Header Card -->
      <div class="card ">
        <div class="card-body crunsh-bg text-white text-center rounded-t-2xl">
          <h1 class="text-4xl brand-font mb-2">crunsh.</h1>
          <p class="text-lg opacity-90">Lofi Content Plan Manager</p>
          <p class="text-sm opacity-80">
            Add new content plans for automated video generation
          </p>
        </div>
        </div>

        <!-- Form Card -->
        <div class="card-body bg-base-100 p-8">
          <form id="contentPlanForm" class="space-y-6">
            <div id="alertContainer"></div>

            <!-- Title -->
            <div class="form-control">
              <label class="label">
                <span class="label-text font-semibold">📝 Title *</span>
              </label>
              <input
                type="text"
                id="title"
                name="title"
                required
                placeholder="e.g., Burger Lofi Beats"
                class="input input-bordered w-full"
              />
              <label class="label">
                <span class="label-text-alt">The title of your lofi video - AI will detect the food theme</span>
              </label>
            </div>

            <!-- Description -->
            <div class="form-control">
              <label class="label">
                <span class="label-text font-semibold">📄 Description</span>
              </label>
              <textarea
                id="description"
                name="description"
                placeholder="Relaxing lofi hip hop beats inspired by delicious burgers..."
                class="textarea textarea-bordered h-24"
              ></textarea>
            </div>

            <!-- Audio Style & Duration Row -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="form-control">
                <label class="label">
                  <span class="label-text font-semibold">🎵 Audio Style</span>
                </label>
                <select id="audioStyle" name="audioStyle" class="select select-bordered w-full">
                  <option value="lofi-chill">Lofi Chill</option>
                  <option value="lofi-jazz">Lofi Jazz</option>
                  <option value="lofi-ambient">Lofi Ambient</option>
                  <option value="lofi-upbeat">Lofi Upbeat</option>
                </select>
              </div>

              <div class="form-control">
                <label class="label">
                  <span class="label-text font-semibold">⏱️ Duration (seconds)</span>
                </label>
                <input
                  type="number"
                  id="duration"
                  name="duration"
                  value="3600"
                  min="60"
                  step="60"
                  class="input input-bordered w-full"
                />
                <label class="label">
                  <span class="label-text-alt">Default: 3600 (1 hour)</span>
                </label>
              </div>
            </div>

            <!-- Tags -->
            <div class="form-control">
              <label class="label">
                <span class="label-text font-semibold">🏷️ Tags</span>
              </label>
              <input
                type="text"
                id="tags"
                name="tags"
                placeholder="lofi, study music, chill beats"
                class="input input-bordered w-full"
              />
              <label class="label">
                <span class="label-text-alt">Comma-separated tags for YouTube</span>
              </label>
            </div>

            <!-- Image Prompt -->
            <div class="form-control">
              <label class="label">
                <span class="label-text font-semibold">🖼️ Image Prompt</span>
              </label>
              <textarea
                id="imagePrompt"
                name="imagePrompt"
                placeholder="Cozy anime style scene with a burger on a plate..."
                class="textarea textarea-bordered h-24"
              ></textarea>
              <label class="label">
                <span class="label-text-alt">Optional: Custom image generation prompt</span>
              </label>
            </div>

            <!-- Chapters Section -->
            <div class="bg-base-200 p-6 rounded-lg">
              <label class="label">
                <span class="label-text font-semibold">📚 Chapters</span>
              </label>
              <p class="text-sm text-base-content/60 mb-4">
                Add timestamps and titles for YouTube chapters
              </p>
              <div id="chaptersContainer" class="space-y-2">
                <div class="chapter-item flex gap-2">
                  <input
                    type="text"
                    placeholder="0:00"
                    class="chapter-time input input-bordered input-sm flex-1"
                    required
                  />
                  <input
                    type="text"
                    placeholder="Intro"
                    class="chapter-title input input-bordered input-sm flex-[2]"
                    required
                  />
                  <button
                    type="button"
                    class="btn btn-error btn-sm"
                    onclick="removeChapter(this)"
                  >
                    ✕
                  </button>
                </div>
              </div>
              <button type="button" class="btn btn-primary btn-sm mt-3" onclick="addChapter()">
                + Add Chapter
              </button>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary w-full crunsh-bg border-0 text-white brand-font text-lg" id="submitBtn">
              ✨ Create Content Plan
            </button>
          </form>
        </div>
      </div>
    </div>

    <script>
      let chapterCount = 1;

      function addChapter() {
        chapterCount++;
        const container = document.getElementById("chaptersContainer");
        const chapterItem = document.createElement("div");
        chapterItem.className = "chapter-item flex gap-2";
        chapterItem.innerHTML = `
          <input type="text" placeholder="0:00" class="chapter-time input input-bordered input-sm flex-1" required>
          <input type="text" placeholder="Chapter ${chapterCount}" class="chapter-title input input-bordered input-sm flex-[2]" required>
          <button type="button" class="btn btn-error btn-sm" onclick="removeChapter(this)">✕</button>
        `;
        container.appendChild(chapterItem);
      }

      function removeChapter(btn) {
        const chapters = document.querySelectorAll(".chapter-item");
        if (chapters.length > 1) {
          btn.parentElement.remove();
        } else {
          showAlert("You must have at least one chapter", "error");
        }
      }

      function showAlert(message, type) {
        const container = document.getElementById("alertContainer");
        const alertClass = type === "error" ? "alert-error" : "alert-success";
        const alert = document.createElement("div");
        alert.className = `alert ${alertClass} mb-4`;
        alert.innerHTML = `<span>${message}</span>`;
        container.innerHTML = "";
        container.appendChild(alert);

        setTimeout(() => {
          alert.remove();
        }, 5000);
      }

      document
        .getElementById("contentPlanForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const submitBtn = document.getElementById("submitBtn");
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<span class="loading loading-spinner"></span> Creating...';

          // Collect form data
          const formData = {
            title: document.getElementById("title").value,
            description: document.getElementById("description").value,
            audioStyle: document.getElementById("audioStyle").value,
            duration: parseInt(document.getElementById("duration").value),
            tags: document.getElementById("tags").value,
            imagePrompt: document.getElementById("imagePrompt").value,
            chapters: [],
          };

          // Collect chapters
          const chapterTimes = document.querySelectorAll(".chapter-time");
          const chapterTitles = document.querySelectorAll(".chapter-title");

          for (let i = 0; i < chapterTimes.length; i++) {
            formData.chapters.push({
              time: chapterTimes[i].value,
              title: chapterTitles[i].value,
            });
          }

          try {
            const response = await fetch("/api/content-plan", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(formData),
            });

            const result = await response.json();

            if (response.ok) {
              showAlert("✓ Content plan created successfully!", "success");
              document.getElementById("contentPlanForm").reset();

              // Reset chapters to one
              document.getElementById("chaptersContainer").innerHTML = `
                <div class="chapter-item flex gap-2">
                  <input type="text" placeholder="0:00" class="chapter-time input input-bordered input-sm flex-1" required>
                  <input type="text" placeholder="Intro" class="chapter-title input input-bordered input-sm flex-[2]" required>
                  <button type="button" class="btn btn-error btn-sm" onclick="removeChapter(this)">✕</button>
                </div>
              `;
              chapterCount = 1;
            } else {
              showAlert(`Error: ${result.error}`, "error");
            }
          } catch (error) {
            showAlert(
              `Failed to create content plan: ${error.message}`,
              "error"
            );
          } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '✨ Create Content Plan';
          }
        });
    </script>
  </body>
</html>
